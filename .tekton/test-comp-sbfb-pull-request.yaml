        - name: name
          value: sast-snyk-check-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-snyk-check-oci-ta-0.4@sha256:d6d29ca411dfef5c2530931f005701a61276d9ef3b20ca1a4db3d0a6f4d6b9cb
