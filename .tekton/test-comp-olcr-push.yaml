        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:ecosystem-cert-preflight-checks-0.2@sha256:b7691368751b8d2a979bd94a29934f9d26e837ecb6ca0a5839ccb94354d979db
        - name: kind
          value: task
        resolver: bundles
      when:
