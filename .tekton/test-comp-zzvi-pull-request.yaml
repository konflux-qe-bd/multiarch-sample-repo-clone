        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:push-dockerfile-oci-ta-0.1@sha256:851c6ce7e76ad48fa81a116aedbcfd9e1635fc359272091e30eed1d7c75755a0
        - name: kind
          value: task
        resolver: bundles
    - name: rpms-signature-scan
      params:
