        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-coverity-check-oci-ta-0.3@sha256:77fd8eb0f018ae626bcfb454ad5dd53558b5dd4e37effbe1c23d8a46de38a205
