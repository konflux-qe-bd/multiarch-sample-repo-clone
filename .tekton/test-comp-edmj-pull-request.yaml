        - name: name
          value: sast-unicode-check-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-unicode-check-oci-ta-0.2@sha256:66340d2b767459c5cd4baa7c79b323cb68a6569edc94f906d992b2010746def7
        - name: kind
          value: task
        resolver: bundles
      when:
