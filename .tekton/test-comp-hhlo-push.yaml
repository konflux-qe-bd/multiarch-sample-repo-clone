      taskRef:
        params:
        - name: name
          value: sast-shell-check-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-shell-check-oci-ta-0.1@sha256:c7a72807ed430819f31338ccb56c265625dcaed293702c6687e90b7da285b742
