      taskRef:
        params:
        - name: name
          value: sast-snyk-check-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-snyk-check-oci-ta-0.4@sha256:410f8ea88d3655ca74f02c82c8c841951d8f6d7d8616b33dd20401e57485a771
        - name: kind
