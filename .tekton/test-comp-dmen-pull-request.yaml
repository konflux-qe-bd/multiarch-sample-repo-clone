        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:push-dockerfile-oci-ta-0.1@sha256:98bf01f10f229464bd9fb0ad6674b5de0c44bed169473120e6494f7898a4970a
        - name: kind
          value: task
        resolver: bundles
    - name: rpms-signature-scan
