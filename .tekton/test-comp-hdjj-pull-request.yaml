      taskRef:
        params:
        - name: name
          value: clamav-scan
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:clamav-scan-0.2@sha256:9930709549c7465784d1e49a6044c9717bb05975e23591b6264d519593d6d36b
        - name: kind
