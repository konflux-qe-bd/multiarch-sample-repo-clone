        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:push-dockerfile-oci-ta-0.1@sha256:eca9ebbbfb8490747d55d2f01b3ba9ef7175a17de0c5dcc1fa0c372636b8ecfa
        - name: kind
