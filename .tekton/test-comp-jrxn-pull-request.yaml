        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:ecosystem-cert-preflight-checks-0.2@sha256:8059ec8be8d348137d20e3ce79b64ae13f359bb43788a9338b76cc4913b3202e
        - name: kind
