        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:clamav-scan-0.2@sha256:c16554853e47c48d00ed96eff5d2a06cc8824a53cab5fc0af29c6b34d51ccd93
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
