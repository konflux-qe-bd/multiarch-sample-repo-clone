        - name: name
          value: sast-snyk-check-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-snyk-check-oci-ta-0.4@sha256:0a40a2d98c21b43f3e2a3e1394b050a9dfa2e208e03f760dca90e1aaba53362c
