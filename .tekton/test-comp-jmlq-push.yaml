        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:deprecated-image-check-0.5@sha256:d5a0010a821af31b34746361c3c647c6fea876ddf6cd905ae521e3b8a04d6b3b
        - name: kind
          value: task
