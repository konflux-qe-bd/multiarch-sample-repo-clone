        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:clamav-scan-0.2@sha256:d2d9c653e8e763f905946daa10b3ab9b0ddb3c1a123e7325f85db396f60dce2d
        - name: kind
          value: task
        resolver: bundles
      when:
