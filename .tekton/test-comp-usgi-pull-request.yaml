          value: ecosystem-cert-preflight-checks
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:ecosystem-cert-preflight-checks-0.2@sha256:6785b1c2a60555d8a07538634b39ebf71a847da5848da5c9fe929de172ce34b2
        - name: kind
          value: task
        resolver: bundles
      when:
