        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:clamav-scan-0.2@sha256:70b2567325ab48dc2d59ba14e2359b3d8781ef8e02fbd658ec4c844c05dd793e
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
